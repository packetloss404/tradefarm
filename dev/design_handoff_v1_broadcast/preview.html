<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>V1 Broadcast · preview</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #08090d; color: #fafafa; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased; height: 100%; overflow: hidden; }
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  @keyframes pulse-dot { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(0.5); opacity: 0.4; } }
  .pulse-dot { animation: pulse-dot 1.2s ease-in-out infinite; }
  @keyframes cursor-blink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
  .cursor-blink { animation: cursor-blink 1s step-end infinite; }
  @keyframes v1-marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
  .v1-marquee { animation: v1-marquee 60s linear infinite; }
  #stage { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #000; }
  #scaler { width: 1920px; height: 1080px; transform-origin: center center; }
</style>
</head>
<body>
<div id="stage"><div id="scaler"><div id="root"></div></div></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="mock-data.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="v1-broadcast.jsx"></script>

<script type="text/babel">
  function App() {
    const stream = useStreamMock();
    return <BroadcastV1 stream={stream} />;
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  function fit() {
    const sc = document.getElementById('scaler');
    const k = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
    sc.style.transform = 'scale(' + k + ')';
  }
  fit(); window.addEventListener('resize', fit);
</script>
</body>
</html>
